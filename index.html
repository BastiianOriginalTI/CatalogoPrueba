<script>
function enviarWhatsApp(nombre, precio, codigo) {
    const numero = "56949461990"; // Reemplazar por número real
    const mensaje = `Hola 👋 Vi este producto en el catálogo online de Tienda Digno (Linares):
📦 Producto: ${nombre}
💰 Precio: ${precio}
🔖 Código: ${codigo}
¿Está disponible en tienda?`;

    const url = `https://wa.me/${numero}?text=${encodeURIComponent(mensaje)}`;
    window.open(url, '_blank');
}
</script>
